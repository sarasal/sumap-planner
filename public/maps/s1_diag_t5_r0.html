        <script>
            function addEventListeners(){
                var paths = document.getElementsByTagName('path');

                for (var i = 0; i < paths.length; i++) {
                    paths[i].addEventListener('mouseover', function(event) {
                        event.target.setAttribute('stroke', '#FFB000'); // Change stroke color on hover
                        event.target.bringToFront();
                    });
                    paths[i].addEventListener('mouseout', function(event) {
                        event.target.setAttribute('stroke', '#549FAC'); // Reset stroke color on mouseout
                        event.target.bringToBack();
                    });
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                addEventListeners();
            });
        </script>
